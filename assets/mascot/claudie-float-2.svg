<svg xmlns="http://www.w3.org/2000/svg" width="150" height="250" viewBox="0 0 150 250">
    <defs>
        <style>
            .body-color { fill: #FFE5D9; }
            .body-shadow { fill: #FFCDB2; }
            .eye { fill: #1E293B; }
            .pack { fill: #0284C7; } /* Blue backpack */
            .rope { stroke: #D97706; stroke-width: 3; stroke-dasharray: 4 2; fill: none;}
            
            @keyframes rappel {
                0% { transform: translateY(0px); }
                50% { transform: translateY(-10px); }
                100% { transform: translateY(0px); }
            }
            .floating-group {
                animation: rappel 4s infinite ease-in-out;
            }
            
            @keyframes blink {
                0%, 96%, 98% { transform: scaleY(1); }
                97% { transform: scaleY(0.1); }
            }
            .eyes-group {
                animation: blink 5s infinite;
                transform-origin: 75px 125px;
            }
        </style>
    </defs>
    
    <!-- Rope extending from top -->
    <path d="M 75 0 L 75 250" class="rope"/>
    
    <g class="floating-group" transform="translate(0, 50)">
        
        <!-- Claudie rappelling -->
        <g transform="translate(-25, 0)">
            <!-- Backpack Behind -->
            <rect x="25" y="80" width="25" height="40" rx="6" class="pack"/>
            
            <!-- Body rotated slightly -->
            <g transform="rotate(-15, 100, 140)">
                <path d="M 50 140 C 40 60, 160 60, 150 140 C 150 170, 130 180, 100 180 C 70 180, 50 170, 50 140 Z" class="body-color"/>
                <path d="M 120 140 C 130 90, 150 100, 150 140 C 150 170, 130 180, 100 180 C 120 160, 120 150, 120 140 Z" class="body-shadow"/>
                <rect x="65" y="85" width="70" height="40" rx="20" fill="#FFFBF5" stroke="#FFCDB2" stroke-width="2"/>
                <g class="eyes-group">
                    <ellipse cx="85" cy="105" rx="7" ry="9" class="eye"/>
                    <ellipse cx="115" cy="105" rx="7" ry="9" class="eye"/>
                    <circle cx="82" cy="101" r="2.5" fill="#FFF"/>
                    <circle cx="112" cy="101" r="2.5" fill="#FFF"/>
                </g>
                <ellipse cx="72" cy="115" rx="5" ry="3" fill="#F97316" opacity="0.4"/>
                <ellipse cx="128" cy="115" rx="5" ry="3" fill="#F97316" opacity="0.4"/>
                
                <!-- Arms holding rope -->
                <path d="M 60 120 Q 80 80, 100 70" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
                <path d="M 140 120 Q 120 80, 100 90" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
            </g>
            
            <!-- Carabiner/Harness detail -->
            <circle cx="95" cy="135" r="8" fill="none" stroke="#94A3B8" stroke-width="3"/>
            <path d="M 100 135 L 100 80" stroke="#0F172A" stroke-width="2"/>
        </g>
    </g>
</svg>
