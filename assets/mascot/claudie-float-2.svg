<svg xmlns="http://www.w3.org/2000/svg" width="150" height="250" viewBox="0 0 150 250">
    <defs>
        <style>
            .body-color { fill: #FFE5D9; }
            .body-shadow { fill: #FFCDB2; }
            .accent { fill: #FF9F1C; }
            .eye { fill: #2B2D42; }
            
            @keyframes levitate {
                0% { transform: translateY(0px) rotate(2deg); }
                50% { transform: translateY(-15px) rotate(-1deg); }
                100% { transform: translateY(0px) rotate(2deg); }
            }
            .floating-group {
                animation: levitate 5s infinite ease-in-out;
                transform-origin: 75px 125px;
            }
            
            @keyframes blink {
                0%, 96%, 98% { transform: scaleY(1); }
                97% { transform: scaleY(0.1); }
            }
            .eyes-group {
                animation: blink 6s infinite;
                transform-origin: 75px 125px;
            }
        </style>
    </defs>
    
    <g class="floating-group" transform="translate(0, 30)">
        
        <!-- Claudie (reading while falling) -->
        <g transform="translate(-25, 0)">
            <!-- Little propeller hat -->
            <rect x="98" y="-5" width="4" height="15" fill="#8D99AE"/>
            <ellipse cx="100" cy="-5" rx="15" ry="3" fill="#00F4D2"/>
            
            <path d="M 50 140 C 40 60, 160 60, 150 140 C 150 170, 130 180, 100 180 C 70 180, 50 170, 50 140 Z" class="body-color"/>
            <path d="M 120 140 C 130 90, 150 100, 150 140 C 150 170, 130 180, 100 180 C 120 160, 120 150, 120 140 Z" class="body-shadow"/>
            <rect x="65" y="85" width="70" height="40" rx="20" fill="#FFFBF5" stroke="#FFCDB2" stroke-width="2"/>
            <g class="eyes-group">
                <!-- Looking down at book -->
                <ellipse cx="85" cy="110" rx="7" ry="6" class="eye"/>
                <ellipse cx="115" cy="110" rx="7" ry="6" class="eye"/>
                <circle cx="82" cy="108" r="2" fill="#FFF"/>
                <circle cx="112" cy="108" r="2" fill="#FFF"/>
            </g>
            
            <!-- Book in hands -->
            <path d="M 75 140 L 125 140 L 115 155 L 65 155 Z" fill="#2B2D42"/>
            <path d="M 70 135 L 120 135 L 125 140 L 75 140 Z" fill="#FFFBF5"/>
            
            <!-- Arms holding book -->
            <path d="M 50 120 Q 60 140, 75 145" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
            <path d="M 150 120 Q 140 140, 125 145" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
        </g>
    </g>
</svg>
