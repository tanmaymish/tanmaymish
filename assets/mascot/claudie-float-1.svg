<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300" viewBox="0 0 200 300">
    <defs>
        <style>
            .body-color { fill: #FFE5D9; }
            .body-shadow { fill: #FFCDB2; }
            .eye { fill: #1E293B; }
            .pack { fill: #10B981; } /* Green backpack */
            .pack-strap { fill: #047857; stroke: #047857; stroke-width: 4; }
            .stick { stroke: #92400E; stroke-width: 4; stroke-linecap: round; }
            .parachute { fill: #FFB067; }
            .parachute-line { stroke: #94A3B8; stroke-width: 2; }
            
            @keyframes swing {
                0% { transform: translateY(0px) rotate(-4deg); }
                50% { transform: translateY(-15px) rotate(4deg); }
                100% { transform: translateY(0px) rotate(-4deg); }
            }
            .floating-group {
                animation: swing 6s infinite ease-in-out;
                transform-origin: 100px 50px;
            }
            
            @keyframes blink {
                0%, 96%, 98% { transform: scaleY(1); }
                97% { transform: scaleY(0.1); }
            }
            .eyes-group {
                animation: blink 4.5s infinite;
                transform-origin: 100px 200px;
            }
        </style>
    </defs>
    
    <g class="floating-group" transform="translate(0, 30)">
        
        <!-- Parachute -->
        <path d="M 50 120 L 100 60 L 150 120" class="parachute-line"/>
        <path d="M 100 120 L 100 60" class="parachute-line"/>
        <path d="M 30 60 Q 100 -20, 170 60 Z" class="parachute"/>
        <path d="M 30 60 Q 65 50, 100 60 Q 135 50, 170 60" fill="none" stroke="#F97316" stroke-width="2"/>
        
        <!-- Claudie -->
        <g transform="translate(0, 20)">
            <!-- Backpack Behind -->
            <rect x="135" y="110" width="30" height="50" rx="8" class="pack"/>
            <rect x="145" y="120" width="25" height="20" rx="4" fill="#047857"/>
            
            <!-- Body -->
            <path d="M 75 180 C 65 100, 185 100, 175 180 C 175 210, 155 220, 125 220 C 95 220, 75 210, 75 180 Z" class="body-color"/>
            <path d="M 145 180 C 155 130, 175 140, 175 180 C 175 210, 155 220, 125 220 C 145 200, 145 190, 145 180 Z" class="body-shadow"/>
            
            <!-- Backpack strap over body -->
            <path d="M 140 100 Q 120 140, 140 170" fill="none" class="pack-strap"/>
            
            <rect x="90" y="125" width="70" height="40" rx="20" fill="#FFFBF5" stroke="#FFCDB2" stroke-width="2"/>
            <g class="eyes-group">
                <ellipse cx="110" cy="145" rx="7" ry="9" class="eye"/>
                <ellipse cx="140" cy="145" rx="7" ry="9" class="eye"/>
                <circle cx="107" cy="141" r="2.5" fill="#FFF"/>
                <circle cx="137" cy="141" r="2.5" fill="#FFF"/>
            </g>
            <ellipse cx="97" cy="155" rx="5" ry="3" fill="#F97316" opacity="0.4"/>
            <ellipse cx="153" cy="155" rx="5" ry="3" fill="#F97316" opacity="0.4"/>
            
            <!-- Arms holding parachute lines -->
            <path d="M 85 160 Q 60 130, 50 100" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
            <path d="M 165 160 Q 180 130, 150 100" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
        </g>
    </g>
</svg>
