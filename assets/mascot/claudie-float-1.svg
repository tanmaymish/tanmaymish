<svg xmlns="http://www.w3.org/2000/svg" width="150" height="250" viewBox="0 0 150 250">
    <defs>
        <style>
            .body-color { fill: #FFE5D9; }
            .body-shadow { fill: #FFCDB2; }
            .accent { fill: #FF9F1C; }
            .eye { fill: #2B2D42; }
            
            @keyframes swing {
                0% { transform: translateY(0px) rotate(-3deg); }
                50% { transform: translateY(-10px) rotate(3deg); }
                100% { transform: translateY(0px) rotate(-3deg); }
            }
            .floating-group {
                animation: swing 4s infinite ease-in-out;
                transform-origin: 75px 50px;
            }
            
            @keyframes blink {
                0%, 96%, 98% { transform: scaleY(1); }
                97% { transform: scaleY(0.1); }
            }
            .eyes-group {
                animation: blink 4.5s infinite;
                transform-origin: 75px 125px;
            }
            
            .balloon-string { fill: none; stroke: #8D99AE; stroke-width: 2; }
            .balloon { fill: #FF9F1C; }
        </style>
    </defs>
    
    <g class="floating-group" transform="translate(0, 40)">
        <!-- Balloons -->
        <path d="M 75 100 Q 60 50, 40 20" class="balloon-string"/>
        <path d="M 75 100 Q 85 50, 110 30" class="balloon-string"/>
        
        <circle cx="40" cy="15" r="25" fill="#00F4D2" opacity="0.8"/>
        <circle cx="110" cy="20" r="25" fill="#FF9F1C" opacity="0.8"/>
        <circle cx="75" cy="-5" r="30" fill="#FF7A59" opacity="0.8"/>
        
        <!-- Claudie -->
        <g transform="translate(-25, -45)">
            <path d="M 50 140 C 40 60, 160 60, 150 140 C 150 170, 130 180, 100 180 C 70 180, 50 170, 50 140 Z" class="body-color"/>
            <path d="M 120 140 C 130 90, 150 100, 150 140 C 150 170, 130 180, 100 180 C 120 160, 120 150, 120 140 Z" class="body-shadow"/>
            <rect x="65" y="85" width="70" height="40" rx="20" fill="#FFFBF5" stroke="#FFCDB2" stroke-width="2"/>
            <g class="eyes-group">
                <ellipse cx="85" cy="105" rx="7" ry="9" class="eye"/>
                <ellipse cx="115" cy="105" rx="7" ry="9" class="eye"/>
                <circle cx="82" cy="101" r="2.5" fill="#FFF"/>
                <circle cx="112" cy="101" r="2.5" fill="#FFF"/>
            </g>
            <ellipse cx="72" cy="115" rx="5" ry="3" fill="#FF9F1C" opacity="0.4"/>
            <ellipse cx="128" cy="115" rx="5" ry="3" fill="#FF9F1C" opacity="0.4"/>
            
            <!-- Arms reaching up -->
            <path d="M 60 120 Q 40 70, 60 40" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
            <path d="M 140 120 Q 160 70, 140 40" fill="none" stroke="#FFCDB2" stroke-width="12" stroke-linecap="round"/>
        </g>
    </g>
</svg>
