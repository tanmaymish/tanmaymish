<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
            
            .bg { fill: #050816; }
            .card { fill: #0B1220; stroke: #111827; stroke-width: 2; rx: 12; }
            
            .text-title { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; fill: #E5E7EB; }
            .text-value { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 24px; fill: #ffffff; }
            
            .ring-bg { fill: none; stroke: #1F2937; stroke-width: 8; stroke-linecap: round; }
            .ring-fg { fill: none; stroke: #3B82F6; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 200; stroke-dashoffset: 200; }
            
            @keyframes loadRing {
                to { stroke-dashoffset: var(--dash); }
            }
            .anim-ring {
                animation: loadRing 2s ease-out forwards;
            }
            
            .bar-bg { fill: #1F2937; rx: 4; }
            .bar-fg { fill: #8B5CF6; rx: 4; }
            
            @keyframes loadBar {
                from { width: 0; }
                to { width: var(--w); }
            }
            .anim-bar {
                animation: loadBar 2s ease-out forwards;
            }

            .pulse { animation: pulseAnim 2s infinite; }
            @keyframes pulseAnim {
                0% { opacity: 1; }
                50% { opacity: 0.4; }
                100% { opacity: 1; }
            }
        </style>
    </defs>

    <rect width="800" height="200" class="bg" />

    <!-- Card 1: CPU / Energy -->
    <g transform="translate(20, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">SYSTEM ENERGY</text>
        <g transform="translate(190, 80)">
             <circle cx="0" cy="0" r="32" class="ring-bg"/>
             <circle cx="0" cy="0" r="32" class="ring-fg anim-ring" style="--dash: 40; stroke: #06B6D4;" transform="rotate(-90)"/>
             <text x="0" y="6" class="text-title" text-anchor="middle">85%</text>
        </g>
        <text x="20" y="90" class="text-value">Optimal</text>
        <circle cx="20" cy="115" r="4" fill="#22C55E" class="pulse"/>
        <text x="32" y="119" class="text-title" font-size="12" fill="#9CA3AF">All systems operational</text>
    </g>

    <!-- Card 2: Metrics -->
    <g transform="translate(280, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">METRICS</text>
        
        <text x="20" y="70" class="text-title" font-size="12" fill="#9CA3AF">Projects</text>
        <rect x="20" y="80" width="200" height="8" class="bar-bg" />
        <rect x="20" y="80" height="8" class="bar-fg anim-bar" style="--w: 180px; fill: #3B82F6;" />
        
        <text x="20" y="115" class="text-title" font-size="12" fill="#9CA3AF">Learning / Growth</text>
        <rect x="20" y="125" width="200" height="8" class="bar-bg" />
        <rect x="20" y="125" height="8" class="bar-fg anim-bar" style="--w: 190px; fill: #8B5CF6;" />
    </g>

    <!-- Card 3: Security Posture -->
    <g transform="translate(540, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">SECURITY POSTURE</text>
        <g transform="translate(120, 90)">
            <!-- Shield icon -->
            <path d="M 0 -35 L 30 -20 L 30 10 Q 30 35, 0 45 Q -30 35, -30 10 L -30 -20 Z" fill="none" stroke="#22C55E" stroke-width="3" stroke-linejoin="round" class="pulse"/>
            <path d="M -15 -5 L -5 5 L 15 -15" fill="none" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/>
        </g>
        <text x="120" y="145" class="text-title" font-size="12" fill="#22C55E" text-anchor="middle">DEFENSES ACTIVE</text>
    </g>

</svg>
