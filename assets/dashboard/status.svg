<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
            
            /* Deep mountain palette */
            .bg { fill: #0B1021; }
            .card { fill: rgba(15, 23, 42, 0.7); stroke: rgba(255, 255, 255, 0.1); stroke-width: 1; rx: 12; }
            
            .text-title { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; fill: #94A3B8; }
            .text-value { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 24px; fill: #F1F5F9; }
            
            .ring-bg { fill: none; stroke: #1E293B; stroke-width: 8; stroke-linecap: round; }
            .ring-fg { fill: none; stroke: #38BDF8; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 200; stroke-dashoffset: 200; }
            
            @keyframes loadRing {
                to { stroke-dashoffset: var(--dash); }
            }
            .anim-ring {
                animation: loadRing 2s ease-out forwards;
            }
            
            .bar-bg { fill: #1E293B; rx: 4; }
            
            @keyframes loadBar {
                from { width: 0; }
                to { width: var(--w); }
            }
            .anim-bar-1 { fill: #10B981; rx: 4; animation: loadBar 2s ease-out forwards; }
            .anim-bar-2 { fill: #FFB067; rx: 4; animation: loadBar 2.2s ease-out forwards; }

            .pulse { animation: pulseAnim 2s infinite; }
            @keyframes pulseAnim {
                0% { opacity: 1; }
                50% { opacity: 0.4; }
                100% { opacity: 1; }
            }
        </style>
    </defs>

    <rect width="800" height="200" class="bg" />

    <!-- Card 1: Altitude / Journey Progress -->
    <g transform="translate(20, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">ALTITUDE / ENERGY</text>
        <g transform="translate(190, 80)">
             <circle cx="0" cy="0" r="32" class="ring-bg"/>
             <circle cx="0" cy="0" r="32" class="ring-fg anim-ring" style="--dash: 40; stroke: #38BDF8;" transform="rotate(-90)"/>
             <text x="0" y="6" class="text-title" fill="#F1F5F9" text-anchor="middle">85%</text>
        </g>
        <text x="20" y="90" class="text-value">Peak Setup</text>
        <circle cx="20" cy="115" r="4" fill="#10B981" class="pulse"/>
        <text x="32" y="119" class="text-title" font-size="12" fill="#94A3B8">Ready for ascent</text>
    </g>

    <!-- Card 2: Trail Metrics -->
    <g transform="translate(280, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">TRAIL METRICS</text>
        
        <text x="20" y="70" class="text-title" font-size="12">Expeditions (Projects)</text>
        <rect x="20" y="80" width="200" height="8" class="bar-bg" />
        <rect x="20" y="80" height="8" class="anim-bar-1" style="--w: 180px;" />
        
        <text x="20" y="115" class="text-title" font-size="12">Exploration (Learning)</text>
        <rect x="20" y="125" width="200" height="8" class="bar-bg" />
        <rect x="20" y="125" height="8" class="anim-bar-2" style="--w: 190px;" />
    </g>

    <!-- Card 3: Camp Security Posture -->
    <g transform="translate(540, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">BASECAMP SECURITY</text>
        <g transform="translate(120, 90)">
            <!-- Campfire or Shield -->
            <path d="M 0 -35 L 30 -20 L 30 10 Q 30 35, 0 45 Q -30 35, -30 10 L -30 -20 Z" fill="none" stroke="#F97316" stroke-width="3" stroke-linejoin="round" class="pulse"/>
            <!-- Fire -->
            <path d="M 0 20 Q -10 5, 0 -10 Q 10 5, 0 20 Z" fill="#F97316" />
        </g>
        <text x="120" y="145" class="text-title" font-size="12" fill="#F97316" text-anchor="middle">DEFENSES ACTIVE</text>
    </g>

</svg>
