<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
            
            /* Anime palette */
            .bg { fill: #14082B; }
            .card { fill: rgba(30, 20, 50, 0.5); stroke: rgba(251, 207, 232, 0.1); stroke-width: 1; rx: 12; }
            
            .text-title { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; fill: #F472B6; }
            .text-value { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 24px; fill: #FDF2F8; filter: drop-shadow(0 0 2px rgba(253, 242, 248, 0.5)); }
            
            .ring-bg { fill: none; stroke: #311A42; stroke-width: 8; stroke-linecap: round; }
            .ring-fg { fill: none; stroke: #60A5FA; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 200; stroke-dashoffset: 200; filter: drop-shadow(0 0 4px #60A5FA); }
            
            @keyframes loadRing {
                to { stroke-dashoffset: var(--dash); }
            }
            .anim-ring {
                animation: loadRing 2s ease-out forwards;
            }
            
            .bar-bg { fill: #311A42; rx: 4; }
            
            @keyframes loadBar {
                from { width: 0; }
                to { width: var(--w); }
            }
            .anim-bar-1 { fill: #F472B6; rx: 4; animation: loadBar 2s ease-out forwards; filter: drop-shadow(0 0 4px #F472B6); }
            .anim-bar-2 { fill: #FBCFE8; rx: 4; animation: loadBar 2.2s ease-out forwards; filter: drop-shadow(0 0 4px #FBCFE8); }

            .pulse { animation: pulseAnim 2s infinite; filter: drop-shadow(0 0 6px #F472B6); }
            @keyframes pulseAnim {
                0% { opacity: 1; }
                50% { opacity: 0.3; }
                100% { opacity: 1; }
            }
        </style>
    </defs>

    <rect width="800" height="200" class="bg" />

    <g transform="translate(20, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">ENERGY LEVELS</text>
        <g transform="translate(190, 80)">
             <circle cx="0" cy="0" r="32" class="ring-bg"/>
             <circle cx="0" cy="0" r="32" class="ring-fg anim-ring" style="--dash: 40; stroke: #60A5FA;" transform="rotate(-90)"/>
             <text x="0" y="6" class="text-title" fill="#FDF2F8" text-anchor="middle">85%</text>
        </g>
        <text x="20" y="90" class="text-value">Limit Break</text>
        <circle cx="20" cy="115" r="4" fill="#60A5FA" class="pulse"/>
        <text x="32" y="119" class="text-title" font-size="12" fill="#93C5FD">Systems operational</text>
    </g>

    <g transform="translate(280, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">JOURNEY METRICS</text>
        
        <text x="20" y="70" class="text-title" font-size="12">Missions (Projects)</text>
        <rect x="20" y="80" width="200" height="8" class="bar-bg" />
        <rect x="20" y="80" height="8" class="anim-bar-1" style="--w: 180px;" />
        
        <text x="20" y="115" class="text-title" font-size="12">Training (Learning)</text>
        <rect x="20" y="125" width="200" height="8" class="bar-bg" />
        <rect x="20" y="125" height="8" class="anim-bar-2" style="--w: 190px;" />
    </g>

    <g transform="translate(540, 20)">
        <rect width="240" height="160" class="card" />
        <text x="20" y="35" class="text-title">SYSTEM SECURITY</text>
        <g transform="translate(120, 90)">
            <path d="M 0 -35 L 30 -20 L 30 10 Q 30 35, 0 45 Q -30 35, -30 10 L -30 -20 Z" fill="none" stroke="#F472B6" stroke-width="3" stroke-linejoin="round" class="pulse"/>
            <path d="M -15 -5 L -5 5 L 15 -15" fill="none" stroke="#F472B6" stroke-width="3" stroke-linecap="round"/>
        </g>
        <text x="120" y="145" class="text-title" font-size="12" fill="#F472B6" text-anchor="middle">BARRIER ACTIVE</text>
    </g>
</svg>
