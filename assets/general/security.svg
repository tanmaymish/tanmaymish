<svg xmlns="http://www.w3.org/2000/svg" width="900" height="160" viewBox="0 0 900 160">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono&amp;display=swap');
            .title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 18px; fill: #FDF2F8; }
            .stat { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 32px; fill: #F472B6; filter: drop-shadow(0 0 6px rgba(244,114,182,0.4)); }
            .label { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 12px; fill: #B794C0; }
            .cert { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 12px; fill: #D4B0C7; }
            .card { fill: rgba(20, 10, 40, 0.6); stroke: rgba(244, 114, 182, 0.12); stroke-width: 1; rx: 14; }
            .shield { animation: glow 3s infinite alternate; }
            @keyframes glow { 0% { filter: drop-shadow(0 0 2px rgba(244,114,182,0.3)); } 100% { filter: drop-shadow(0 0 10px rgba(244,114,182,0.6)); } }
        </style>
    </defs>
    <rect width="900" height="160" fill="#0E0720"/>
    
    <!-- Left: CVE stat -->
    <g transform="translate(30, 20)">
        <rect width="200" height="120" class="card"/>
        <g transform="translate(100, 45)" class="shield">
            <path d="M 0 -25 L 22 -15 L 22 5 Q 22 25, 0 32 Q -22 25, -22 5 L -22 -15 Z" fill="none" stroke="#F472B6" stroke-width="2"/>
            <path d="M -8 0 L -3 5 L 10 -8" fill="none" stroke="#F472B6" stroke-width="2.5" stroke-linecap="round"/>
        </g>
        <text x="100" y="95" text-anchor="middle" class="stat">25+</text>
        <text x="100" y="115" text-anchor="middle" class="label">CVEs Reported</text>
    </g>
    
    <!-- Middle: Platforms -->
    <g transform="translate(250, 20)">
        <rect width="200" height="120" class="card"/>
        <text x="100" y="40" text-anchor="middle" class="title">Platforms</text>
        <text x="100" y="68" text-anchor="middle" class="cert" fill="#60A5FA">Bugcrowd</text>
        <text x="100" y="90" text-anchor="middle" class="cert" fill="#60A5FA">HackerOne</text>
        <text x="100" y="112" text-anchor="middle" class="label">Security Researcher</text>
    </g>
    
    <!-- Right: Certs -->
    <g transform="translate(470, 20)">
        <rect width="400" height="120" class="card"/>
        <text x="200" y="35" text-anchor="middle" class="title">Certifications</text>
        <text x="20" y="60" class="cert">✦ GRC &amp; Cybersecurity (IFS Pune)</text>
        <text x="20" y="80" class="cert">✦ DDoS Attack &amp; Defense</text>
        <text x="20" y="100" class="cert">✦ Advanced System Security</text>
        <text x="250" y="60" class="cert">✦ Cloud Computing Security</text>
    </g>
</svg>
