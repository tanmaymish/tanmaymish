<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700;800&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
            .name { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 42px; fill: #FDF2F8; filter: drop-shadow(0 0 10px rgba(244, 114, 182, 0.4)); }
            .role { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 16px; fill: #D4B0C7; letter-spacing: 6px; }
        </style>
        <linearGradient id="nameBg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0E0720"/>
            <stop offset="100%" stop-color="#1A0B30"/>
        </linearGradient>
    </defs>
    <rect width="900" height="120" fill="url(#nameBg)"/>
    <text x="450" y="58" text-anchor="middle" class="name">Tanmay Mishra</text>
    <text x="450" y="90" text-anchor="middle" class="role">SOFTWARE ENGINEER · SECURITY · SYSTEMS</text>
</svg>
