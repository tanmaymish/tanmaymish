<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&amp;family=JetBrains+Mono:wght@400&amp;display=swap');
            
            .title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 22px; fill: #FDF2F8; }
            .desc { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 13px; fill: #B794C0; }
            .tech { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #60A5FA; }
            .badge-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 10px; }
            
            .card {
                fill: rgba(20, 10, 40, 0.6);
                stroke: rgba(244, 114, 182, 0.12);
                stroke-width: 1;
                rx: 14;
            }
            .tech-pill { fill: rgba(96, 165, 250, 0.12); rx: 10; }
            .accent-pill { fill: rgba(244, 114, 182, 0.15); rx: 10; }
            
            .accent-line {
                stroke: #F472B6;
                stroke-width: 3;
                stroke-linecap: round;
                opacity: 0.5;
            }
        </style>
        <linearGradient id="pBg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0E0720"/>
            <stop offset="100%" stop-color="#0E0720"/>
        </linearGradient>
    </defs>
    
    <rect width="900" height="500" fill="url(#pBg)"/>

    <!-- ── HunterMind ── -->
    <g transform="translate(30, 20)">
        <rect width="840" height="100" class="card"/>
        <line x1="0" y1="20" x2="0" y2="80" class="accent-line" transform="translate(16, 10)"/>
        <text x="35" y="38" class="title">HunterMind</text>
        <rect x="175" y="22" width="72" height="20" class="accent-pill"/>
        <text x="211" y="36" text-anchor="middle" class="badge-text" fill="#F472B6">🚀 Flagship</text>
        <text x="35" y="62" class="desc">Automated Threat Intelligence Engine — OSINT &amp; vulnerability scanning via distributed task queue</text>
        <rect x="35" y="74" width="50" height="18" class="tech-pill"/><text x="60" y="87" text-anchor="middle" class="tech">Python</text>
        <rect x="93" y="74" width="30" height="18" class="tech-pill"/><text x="108" y="87" text-anchor="middle" class="tech">Go</text>
        <rect x="131" y="74" width="52" height="18" class="tech-pill"/><text x="157" y="87" text-anchor="middle" class="tech">Docker</text>
        <rect x="191" y="74" width="38" height="18" class="tech-pill"/><text x="210" y="87" text-anchor="middle" class="tech">AWS</text>
    </g>

    <!-- ── DOMA ── -->
    <g transform="translate(30, 140)">
        <rect width="410" height="100" class="card"/>
        <line x1="0" y1="20" x2="0" y2="80" class="accent-line" transform="translate(16, 10)"/>
        <text x="35" y="38" class="title">DOMA</text>
        <text x="35" y="60" class="desc">High-throughput distributed order</text>
        <text x="35" y="76" class="desc">processing system (Swiggy/Zomato scale)</text>
        <rect x="35" y="82" width="80" height="16" class="tech-pill"/><text x="75" y="93" text-anchor="middle" class="tech">Spring Boot</text>
        <rect x="123" y="82" width="48" height="16" class="tech-pill"/><text x="147" y="93" text-anchor="middle" class="tech">Kafka</text>
        <rect x="179" y="82" width="78" height="16" class="tech-pill"/><text x="218" y="93" text-anchor="middle" class="tech">PostgreSQL</text>
    </g>

    <!-- ── FileGuard ── -->
    <g transform="translate(460, 140)">
        <rect width="410" height="100" class="card"/>
        <line x1="0" y1="20" x2="0" y2="80" class="accent-line" transform="translate(16, 10)"/>
        <text x="35" y="38" class="title">FileGuard</text>
        <text x="35" y="60" class="desc">File Integrity Monitoring System</text>
        <text x="35" y="76" class="desc">99.9% detection accuracy</text>
        <rect x="35" y="82" width="50" height="16" class="tech-pill"/><text x="60" y="93" text-anchor="middle" class="tech">Python</text>
        <rect x="93" y="82" width="42" height="16" class="tech-pill"/><text x="114" y="93" text-anchor="middle" class="tech">Flask</text>
        <rect x="143" y="82" width="50" height="16" class="tech-pill"/><text x="168" y="93" text-anchor="middle" class="tech">Celery</text>
    </g>

    <!-- ── Oil Spill ── -->
    <g transform="translate(30, 260)">
        <rect width="410" height="100" class="card"/>
        <line x1="0" y1="20" x2="0" y2="80" class="accent-line" transform="translate(16, 10)"/>
        <text x="35" y="38" class="title">Oil Spill Detection</text>
        <rect x="210" y="22" width="85" height="20" class="accent-pill"/>
        <text x="252" y="36" text-anchor="middle" class="badge-text" fill="#F472B6">🏆 SIH Finalist</text>
        <text x="35" y="60" class="desc">Early warning system using ML &amp;</text>
        <text x="35" y="76" class="desc">satellite imagery. -40% alert times</text>
        <rect x="35" y="82" width="30" height="16" class="tech-pill"/><text x="50" y="93" text-anchor="middle" class="tech">ML</text>
        <rect x="73" y="82" width="30" height="16" class="tech-pill"/><text x="88" y="93" text-anchor="middle" class="tech">GIS</text>
        <rect x="111" y="82" width="60" height="16" class="tech-pill"/><text x="141" y="93" text-anchor="middle" class="tech">Satellite</text>
    </g>

    <!-- ── GSoC ── -->
    <g transform="translate(460, 260)">
        <rect width="410" height="100" class="card"/>
        <line x1="0" y1="20" x2="0" y2="80" class="accent-line" transform="translate(16, 10)"/>
        <text x="35" y="38" class="title">Submitty — GSoC 2019</text>
        <text x="35" y="60" class="desc">Built WebSocket-based real-time</text>
        <text x="35" y="76" class="desc">forum modules. Open-source contributor</text>
        <rect x="35" y="82" width="35" height="16" class="tech-pill"/><text x="52" y="93" text-anchor="middle" class="tech">PHP</text>
        <rect x="78" y="82" width="80" height="16" class="tech-pill"/><text x="118" y="93" text-anchor="middle" class="tech">WebSockets</text>
        <rect x="166" y="82" width="68" height="16" class="tech-pill"/><text x="200" y="93" text-anchor="middle" class="tech">REST APIs</text>
    </g>

    <!-- ── Vision ── -->
    <g transform="translate(30, 380)">
        <rect width="840" height="85" class="card"/>
        <line x1="0" y1="17" x2="0" y2="68" class="accent-line" transform="translate(16, 10)"/>
        <text x="35" y="38" class="title">Vision — Software Engineering Intern</text>
        <text x="35" y="60" class="desc">Redesigned order management service. 30% execution speedup. Production-grade Spring microservices.</text>
        <rect x="35" y="66" width="80" height="16" class="tech-pill"/><text x="75" y="77" text-anchor="middle" class="tech">Spring Boot</text>
        <rect x="123" y="66" width="85" height="16" class="tech-pill"/><text x="165" y="77" text-anchor="middle" class="tech">Microservices</text>
    </g>
</svg>
