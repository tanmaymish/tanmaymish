<svg xmlns="http://www.w3.org/2000/svg" width="900" height="80" viewBox="0 0 900 80">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;display=swap');
            .section-title {
                font-family: 'Inter', sans-serif;
                font-weight: 700;
                font-size: 28px;
                fill: #FDF2F8;
                filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.4));
            }
            .glow-line { stroke: url(#tlGrad); stroke-width: 2; }
        </style>
        <linearGradient id="bgGradTL" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#0E0720"/>
            <stop offset="100%" stop-color="#140A28"/>
        </linearGradient>
        <linearGradient id="tlGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#F472B6" stop-opacity="0"/>
            <stop offset="50%" stop-color="#F472B6"/>
            <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
        </linearGradient>
    </defs>
    <rect width="900" height="80" fill="url(#bgGradTL)"/>
    <text x="450" y="45" text-anchor="middle" class="section-title">📈 GitHub Telemetry</text>
    <line x1="280" y1="62" x2="620" y2="62" class="glow-line"/>
</svg>
