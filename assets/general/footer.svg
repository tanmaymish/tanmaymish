<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=JetBrains+Mono&amp;display=swap');
            
            .bg { fill: #0B1021; }
            .hill-1 { fill: #1E293B; }
            .hill-2 { fill: #0F172A; }
            
            .quote { font-family: 'Inter', sans-serif; font-weight: 400; font-style: italic; font-size: 16px; fill: #94A3B8; text-anchor: middle; }
            .author { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; fill: #FFB067; text-anchor: middle; }
            .links { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #38BDF8; text-anchor: middle; }
            
            @keyframes panHills { 
                0% { transform: translateX(0); }
                100% { transform: translateX(-400px); }
            }
            .anim-hills-slow { animation: panHills 20s linear infinite; }
            .anim-hills-fast { animation: panHills 12s linear infinite reverse; }
        </style>
    </defs>
    
    <rect width="800" height="200" class="bg" />

    <!-- Animated Rolling Hills -->
    <g transform="translate(0, 80)">
        <g class="anim-hills-slow" opacity="0.8">
            <path d="M 0 60 Q 100 20, 200 60 T 400 60 T 600 60 T 800 60 T 1000 60 T 1200 60 L 1200 120 L 0 120 Z" class="hill-1" />
        </g>
        <g class="anim-hills-fast" transform="translate(0, 20)" opacity="0.9">
            <path d="M 0 50 Q 80 10, 160 50 T 320 50 T 480 50 T 640 50 T 800 50 T 960 50 T 1120 50 T 1280 50 L 1280 120 L 0 120 Z" class="hill-2" />
        </g>
    </g>

    <text x="400" y="40" class="quote">"Build systems. Not features. Peak by peak."</text>
    <text x="400" y="65" class="author">— Engineering Philosophy</text>
    
    <text x="400" y="150" class="links">GITHUB • LINKEDIN • EMAIL</text>
    <text x="400" y="170" class="links" fill="#64748B" font-size="11">BASECAMP SECURED.</text>

</svg>
