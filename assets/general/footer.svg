<svg xmlns="http://www.w3.org/2000/svg" width="800" height="200" viewBox="0 0 800 200">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=JetBrains+Mono&amp;display=swap');
            
            .bg { fill: #050816; }
            .wave { fill: #0B1220; }
            .wave-highlight { stroke: #3B82F6; stroke-width: 2; fill: none; opacity: 0.5; }
            
            .quote { font-family: 'Inter', sans-serif; font-weight: 400; font-style: italic; font-size: 16px; fill: #9CA3AF; text-anchor: middle; }
            .author { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; fill: #8B5CF6; text-anchor: middle; }
            .links { font-family: 'JetBrains Mono', monospace; font-size: 13px; fill: #06B6D4; text-anchor: middle; }
            
            @keyframes w1 { 
                0% { transform: translateX(0); }
                100% { transform: translateX(-400px); }
            }
            .anim-wave {
                animation: w1 10s linear infinite;
            }
            
            @keyframes w2 { 
                0% { transform: translateX(0); }
                100% { transform: translateX(-400px); }
            }
            .anim-wave-fast {
                animation: w2 7s linear infinite reverse;
            }
        </style>
    </defs>
    
    <rect width="800" height="200" class="bg" />

    <!-- Animated Waves Background -->
    <g transform="translate(0, 100)" opacity="0.6">
        <g class="anim-wave">
            <!-- Long wave path extending to 1200px to allow smooth loop on 800px view -->
            <path d="M 0 50 Q 100 0, 200 50 T 400 50 T 600 50 T 800 50 T 1000 50 T 1200 50 L 1200 100 L 0 100 Z" class="wave" />
            <path d="M 0 50 Q 100 0, 200 50 T 400 50 T 600 50 T 800 50 T 1000 50 T 1200 50" class="wave-highlight" />
        </g>
        <g class="anim-wave-fast" transform="translate(0, 10)">
            <path d="M 0 40 Q 100 80, 200 40 T 400 40 T 600 40 T 800 40 T 1000 40 T 1200 40 L 1200 100 L 0 100 Z" fill="#050816" opacity="0.5"/>
            <path d="M 0 40 Q 100 80, 200 40 T 400 40 T 600 40 T 800 40 T 1000 40 T 1200 40" stroke="#06B6D4" stroke-width="2" fill="none" opacity="0.3"/>
        </g>
    </g>

    <text x="400" y="60" class="quote">"Build systems. Not features."</text>
    <text x="400" y="85" class="author">— Engineering Philosophy</text>
    
    <text x="400" y="160" class="links">GITHUB • LINKEDIN • EMAIL</text>
    <text x="400" y="180" class="links" fill="#4B5563" font-size="11">SYSTEM OPERATIONS TERMINATED.</text>

</svg>
