<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
    <defs>
        <!-- The Anime Twilight Sky Gradient -->
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0E0720" />
            <stop offset="25%" stop-color="#210F40" />
            <stop offset="50%" stop-color="#5B205D" />
            <stop offset="75%" stop-color="#9C2A6B" />
            <stop offset="100%" stop-color="#E1557A" />
        </linearGradient>

        <linearGradient id="cometGrad" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFF" />
            <stop offset="30%" stop-color="#93C5FD" />
            <stop offset="100%" stop-color="#93C5FD" stop-opacity="0" />
        </linearGradient>

        <!-- Fuji Mountains Gradients -->
        <linearGradient id="fujiBack" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3C1A4A" />
            <stop offset="100%" stop-color="#140624" />
        </linearGradient>
        <linearGradient id="fujiFront" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#280C34" />
            <stop offset="100%" stop-color="#080312" />
        </linearGradient>
        
        <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FCE7F3" />
            <stop offset="100%" stop-color="#F472B6" />
        </linearGradient>
        
        <!-- Glowing Moon Gradient -->
        <radialGradient id="moonG" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF" />
            <stop offset="30%" stop-color="#FDF2F8" />
            <stop offset="100%" stop-color="#E879F9" stop-opacity="0" />
        </radialGradient>

        <!-- Dynamic Mist Layer -->
        <linearGradient id="mistGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#5B205D" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#9C2A6B" stop-opacity="0"/>
        </linearGradient>

        <style>
            .star { fill: #FFF; animation: twinkle 4s infinite alternate; }
            @keyframes twinkle {
                0% { opacity: 0.1; }
                50% { opacity: 1; transform: scale(1.2); }
                100% { opacity: 0.1; }
            }
            
            .petal { fill: #FBCFE8; opacity: 0.8; animation: fall linear infinite; }
            @keyframes fall {
                from { transform: translate(200px, -50px) rotate(0deg); opacity: 0; }
                10% { opacity: 0.9; }
                90% { opacity: 0.6; }
                to { transform: translate(-400px, 450px) rotate(360deg); opacity: 0; }
            }
            
            .comet {
                fill: url(#cometGrad);
                animation: shoot 8s ease-in-out infinite;
                transform-origin: center;
            }
            @keyframes shoot {
                0% { transform: translate(900px, -200px); opacity: 0; }
                10% { opacity: 1; }
                20% { transform: translate(-300px, 400px); opacity: 0; }
                100% { transform: translate(-300px, 400px); opacity: 0; }
            }

            .mist {
                animation: flow 30s linear infinite alternate;
            }
            @keyframes flow {
                0% { transform: translateX(0px); }
                100% { transform: translateX(-100px); }
            }
        </style>
    </defs>
    
    <!-- 1. Sky Background -->
    <rect width="900" height="400" fill="url(#skyGrad)" />
    
    <!-- 2. Magical Anime Stars -->
    <g>
        <circle cx="100" cy="50" r="1.5" class="star" style="animation-delay: 0s" />
        <circle cx="300" cy="90" r="2" class="star" style="animation-delay: 1s" />
        <circle cx="650" cy="40" r="2.5" class="star" style="animation-delay: 0.5s" />
        <circle cx="800" cy="120" r="1" class="star" style="animation-delay: 2s" />
        <circle cx="450" cy="80" r="1.5" class="star" style="animation-delay: 1.5s" />
        <circle cx="150" cy="180" r="2" class="star" style="animation-delay: 2.5s" />
    </g>

    <!-- 3. Giant Glowing Moon -->
    <circle cx="650" cy="200" r="180" fill="url(#moonG)" opacity="0.3"/>
    <circle cx="650" cy="200" r="140" fill="url(#moonG)" opacity="0.5"/>
    <circle cx="650" cy="200" r="40" fill="#FFF" filter="drop-shadow(0 0 15px #FFF)"/>

    <!-- 4. Comet / Shooting Star -->
    <g class="comet">
        <path d="M 0 0 L 200 -120 Q 230 -140, 250 -150 L 150 -60 Z" />
        <circle cx="0" cy="0" r="4" fill="#FFF" filter="drop-shadow(0 0 10px #FFF)"/>
    </g>

    <!-- 5. Distant Mountain Range (Left) -->
    <path d="M -100 400 Q 150 180, 400 400 Z" fill="url(#fujiBack)" opacity="0.8"/>
    <!-- Distant Mountain Range (Right) -->
    <path d="M 500 400 Q 750 220, 1000 400 Z" fill="url(#fujiBack)" opacity="0.8"/>

    <!-- 6. Mount Fuji Profile -->
    <path d="M 120 400 Q 450 80, 450 80 Q 780 400, 780 400 Z" fill="url(#fujiFront)" />
    
    <!-- 7. Fuji Snow Cap (Stylized layers) -->
    <path d="M 390 153 Q 450 80, 450 80 Q 510 153, 510 153 Q 480 135, 465 170 Q 450 145, 440 180 Q 425 145, 390 153 Z" fill="url(#snowGrad)" />
    <path d="M 370 178 Q 450 80, 450 80 Q 530 178, 530 178 Q 500 160, 490 195 Q 470 160, 450 185 Q 430 160, 400 195 Q 390 160, 370 178 Z" fill="url(#snowGrad)" opacity="0.5" />

    <!-- 8. Dynamic Mist Layer overlaying mountains -->
    <g class="mist">
        <rect width="1200" height="150" x="-100" y="250" fill="url(#mistGrad)" />
        <path d="M -100 350 Q 200 250, 500 350 T 1100 350 L 1100 400 L -100 400 Z" fill="#9C2A6B" opacity="0.2"/>
        <path d="M 0 380 Q 300 300, 600 380 T 1200 380 L 1200 400 L 0 400 Z" fill="#5B205D" opacity="0.4"/>
    </g>

    <!-- 9. Vibrant Torii Gate in Foreground (Right side) -->
    <g transform="translate(730, 260) scale(0.9)">
        <!-- Vertical Pillars -->
        <rect x="0" y="30" width="14" height="120" fill="#BE123C" rx="2"/>
        <rect x="100" y="30" width="14" height="120" fill="#BE123C" rx="2"/>
        <!-- Shadows -->
        <rect x="0" y="30" width="4" height="120" fill="#881337"/>
        <rect x="100" y="30" width="4" height="120" fill="#881337"/>
        
        <!-- Top Arch Beam -->
        <path d="M -20 20 Q 57 10, 134 20 L 134 5 Q 57 -5, -20 5 Z" fill="#E11D48"/>
        <!-- Bottom intersecting beam -->
        <rect x="-5" y="45" width="124" height="12" fill="#BE123C" rx="2"/>
        <rect x="-5" y="45" width="124" height="4" fill="#E11D48"/>
        
        <!-- Center Plaque -->
        <rect x="47" y="25" width="20" height="30" fill="#140624" stroke="#FB7185" stroke-width="1"/>
    </g>

    <!-- 10. Sakura Particle Emitter -->
    <g>
        <path d="M 0 0 C 10 -5, 10 5, 0 10 C -10 5, -10 -5, 0 0" class="petal" style="animation-duration: 7s; animation-delay: 0s; scale: 1.2;" />
        <path d="M 200 -50 C 210 -55, 210 -45, 200 -40 C 190 -45, 190 -55, 200 -50" class="petal" style="animation-duration: 11s; animation-delay: 2s; scale: 0.8;" />
        <path d="M 400 -20 C 415 -25, 415 -15, 400 -10 C 385 -15, 385 -25, 400 -20" class="petal" style="animation-duration: 9s; animation-delay: 1s;" />
        <path d="M 600 -80 C 608 -83, 608 -77, 600 -74 C 592 -77, 592 -83, 600 -80" class="petal" style="animation-duration: 10s; animation-delay: 4s; scale: 1.5;" />
        <path d="M 800 -10 C 815 -15, 815 -5, 800 0 C 785 -5, 785 -15, 800 -10" class="petal" style="animation-duration: 13s; animation-delay: 0.5s;" />
        <path d="M 900 100 C 910 95, 910 105, 900 110 C 890 105, 890 95, 900 100" class="petal" style="animation-duration: 8s; animation-delay: 3s; filter: drop-shadow(0 0 2px #FBCFE8);" />
        <path d="M 350 -100 C 360 -105, 360 -95, 350 -90 C 340 -95, 340 -105, 350 -100" class="petal" style="animation-duration: 6s; animation-delay: 5s;" />
        <path d="M 100 -20 C 115 -25, 115 -15, 100 -10 C 85 -15, 85 -25, 100 -20" class="petal" style="animation-duration: 12s; animation-delay: 7s; scale: 1.3" />
        <path d="M 500 -150 C 510 -155, 510 -145, 500 -140 C 490 -145, 490 -155, 500 -150" class="petal" style="animation-duration: 9s; animation-delay: 6s; scale: 0.9" />
    </g>

</svg>
