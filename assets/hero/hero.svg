<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
    <defs>
        <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0E0720" />
            <stop offset="25%" stop-color="#210F40" />
            <stop offset="50%" stop-color="#5B205D" />
            <stop offset="75%" stop-color="#9C2A6B" />
            <stop offset="100%" stop-color="#E1557A" />
        </linearGradient>
        <linearGradient id="cometGrad" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFF" />
            <stop offset="30%" stop-color="#93C5FD" />
            <stop offset="100%" stop-color="#93C5FD" stop-opacity="0" />
        </linearGradient>
        <linearGradient id="fujiFront" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#280C34" />
            <stop offset="100%" stop-color="#080312" />
        </linearGradient>
        <linearGradient id="fujiBack" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3C1A4A" />
            <stop offset="100%" stop-color="#140624" />
        </linearGradient>
        <linearGradient id="snowGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FCE7F3" />
            <stop offset="100%" stop-color="#F472B6" />
        </linearGradient>
        <radialGradient id="moonG" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FFF" />
            <stop offset="30%" stop-color="#FDF2F8" />
            <stop offset="100%" stop-color="#E879F9" stop-opacity="0" />
        </radialGradient>
        <linearGradient id="mistGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#5B205D" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#9C2A6B" stop-opacity="0"/>
        </linearGradient>
        <style>
            .star { fill: #FFF; animation: twinkle 4s infinite alternate; }
            @keyframes twinkle { 0% { opacity: 0.1; } 50% { opacity: 1; } 100% { opacity: 0.1; } }
            .petal { fill: #FBCFE8; opacity: 0; animation: fall linear infinite; }
            @keyframes fall {
                0% { transform: translate(200px, -50px) rotate(0deg); opacity: 0; }
                10% { opacity: 0.85; }
                90% { opacity: 0.5; }
                100% { transform: translate(-400px, 480px) rotate(720deg); opacity: 0; }
            }
            .comet { fill: url(#cometGrad); animation: shoot 9s ease-in-out infinite; }
            @keyframes shoot {
                0% { transform: translate(950px, -200px); opacity: 0; }
                8% { opacity: 1; }
                18% { transform: translate(-300px, 400px); opacity: 0; }
                100% { opacity: 0; }
            }
            .mist { animation: flow 25s linear infinite alternate; }
            @keyframes flow { 0% { transform: translateX(0); } 100% { transform: translateX(-80px); } }
        </style>
    </defs>
    
    <rect width="900" height="420" fill="url(#skyGrad)" />
    
    <!-- Stars -->
    <circle cx="80" cy="40" r="1.5" class="star" style="animation-delay:0s"/>
    <circle cx="200" cy="100" r="1" class="star" style="animation-delay:0.7s"/>
    <circle cx="320" cy="55" r="2" class="star" style="animation-delay:1.2s"/>
    <circle cx="500" cy="30" r="1.5" class="star" style="animation-delay:1.8s"/>
    <circle cx="620" cy="70" r="1" class="star" style="animation-delay:2.5s"/>
    <circle cx="750" cy="45" r="2" class="star" style="animation-delay:0.3s"/>
    <circle cx="850" cy="100" r="1" class="star" style="animation-delay:3s"/>
    <circle cx="150" cy="150" r="1.5" class="star" style="animation-delay:1.5s"/>

    <!-- Giant Moon -->
    <circle cx="680" cy="180" r="200" fill="url(#moonG)" opacity="0.25"/>
    <circle cx="680" cy="180" r="150" fill="url(#moonG)" opacity="0.4"/>
    <circle cx="680" cy="180" r="45" fill="#FFF" filter="drop-shadow(0 0 20px #FFF) drop-shadow(0 0 60px rgba(255,255,255,0.3))"/>

    <!-- Comet -->
    <g class="comet">
        <path d="M 0 0 L 220 -130 Q 250 -150, 270 -160 L 160 -70 Z"/>
        <circle cx="0" cy="0" r="4" fill="#FFF" filter="drop-shadow(0 0 12px #FFF)"/>
    </g>

    <!-- Distant Mountains -->
    <path d="M -100 420 Q 100 220, 300 420 Z" fill="url(#fujiBack)" opacity="0.6"/>
    <path d="M 550 420 Q 780 250, 1000 420 Z" fill="url(#fujiBack)" opacity="0.6"/>

    <!-- Mt. Fuji -->
    <path d="M 100 420 Q 450 60, 450 60 Q 800 420, 800 420 Z" fill="url(#fujiFront)"/>
    <!-- Snow Cap -->
    <path d="M 400 140 Q 450 60, 450 60 Q 500 140, 500 140 Q 475 125, 462 155 Q 450 130, 440 160 Q 430 130, 400 140 Z" fill="url(#snowGrad)"/>
    <path d="M 380 165 Q 450 60, 450 60 Q 520 165, 520 165 Q 495 150, 485 180 Q 465 145, 450 175 Q 435 150, 410 185 Q 395 150, 380 165 Z" fill="url(#snowGrad)" opacity="0.35"/>

    <!-- Mist -->
    <g class="mist">
        <rect width="1200" height="130" x="-100" y="290" fill="url(#mistGrad)"/>
        <path d="M -100 370 Q 250 280, 600 370 T 1100 370 L 1100 420 L -100 420 Z" fill="#9C2A6B" opacity="0.15"/>
        <path d="M 0 400 Q 350 330, 700 400 T 1200 400 L 1200 420 L 0 420 Z" fill="#5B205D" opacity="0.35"/>
    </g>

    <!-- Torii Gate -->
    <g transform="translate(740, 275) scale(0.85)">
        <rect x="0" y="30" width="14" height="125" fill="#BE123C" rx="2"/>
        <rect x="100" y="30" width="14" height="125" fill="#BE123C" rx="2"/>
        <rect x="0" y="30" width="4" height="125" fill="#881337"/>
        <rect x="100" y="30" width="4" height="125" fill="#881337"/>
        <path d="M -20 20 Q 57 8, 134 20 L 134 5 Q 57 -8, -20 5 Z" fill="#E11D48"/>
        <rect x="-5" y="45" width="124" height="12" fill="#BE123C" rx="2"/>
        <rect x="-5" y="45" width="124" height="4" fill="#E11D48"/>
        <rect x="47" y="25" width="20" height="28" fill="#140624" stroke="#FB7185" stroke-width="1"/>
    </g>

    <!-- Sakura -->
    <path d="M 50 0 C 60 -5, 60 5, 50 10 C 40 5, 40 -5, 50 0" class="petal" style="animation-duration:7s;animation-delay:0s;"/>
    <path d="M 200 -30 C 210 -35, 210 -25, 200 -20 C 190 -25, 190 -35, 200 -30" class="petal" style="animation-duration:10s;animation-delay:2s;"/>
    <path d="M 400 -40 C 412 -45, 412 -35, 400 -30 C 388 -35, 388 -45, 400 -40" class="petal" style="animation-duration:8s;animation-delay:1s;"/>
    <path d="M 600 -20 C 608 -23, 608 -17, 600 -14 C 592 -17, 592 -23, 600 -20" class="petal" style="animation-duration:11s;animation-delay:4s;"/>
    <path d="M 800 -50 C 812 -55, 812 -45, 800 -40 C 788 -45, 788 -55, 800 -50" class="petal" style="animation-duration:9s;animation-delay:0.5s;"/>
    <path d="M 300 -80 C 310 -85, 310 -75, 300 -70 C 290 -75, 290 -85, 300 -80" class="petal" style="animation-duration:12s;animation-delay:5s;"/>
    <path d="M 700 -100 C 712 -105, 712 -95, 700 -90 C 688 -95, 688 -105, 700 -100" class="petal" style="animation-duration:6s;animation-delay:3s;"/>
    <path d="M 100 -60 C 115 -65, 115 -55, 100 -50 C 85 -55, 85 -65, 100 -60" class="petal" style="animation-duration:13s;animation-delay:7s;"/>
    <path d="M 500 -120 C 510 -125, 510 -115, 500 -110 C 490 -115, 490 -125, 500 -120" class="petal" style="animation-duration:8s;animation-delay:6s;"/>
    <path d="M 850 10 C 860 5, 860 15, 850 20 C 840 15, 840 5, 850 10" class="petal" style="animation-duration:9s;animation-delay:8s;"/>
</svg>
