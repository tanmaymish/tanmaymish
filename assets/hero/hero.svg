<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Inter:wght@400;600;700&amp;display=swap');
            
            .bg { fill: #0F0C10; } /* very dark warm slate */
            
            /* Luminous Grid */
            .grid { 
                stroke: url(#gridGrad); 
                stroke-width: 1.5; 
                fill: none;
                opacity: 0.3;
            }
            .grid-moving {
                animation: panGrid 15s linear infinite;
            }
            @keyframes panGrid {
                0% { transform: translateY(0) translateX(0); }
                100% { transform: translateY(40px) translateX(40px); }
            }
            
            .title {
                font-family: 'Inter', sans-serif;
                font-weight: 700;
                font-size: 46px;
                fill: #FFFBF5;
                letter-spacing: -1px;
            }
            
            .subtitle {
                font-family: 'Inter', sans-serif;
                font-weight: 400;
                font-size: 22px;
                fill: url(#textGrad);
            }
            
            .typewriter {
                font-family: 'JetBrains Mono', monospace;
                font-size: 16px;
                fill: #FF9F1C;
            }

            .cursor {
                fill: #FF9F1C;
                animation: blink 1s step-end infinite;
            }
            @keyframes blink { 50% { opacity: 0; } }
            
            .particle {
                fill: #FF7A59;
                opacity: 0.7;
            }
            
            .glow {
                filter: drop-shadow(0 0 12px rgba(255, 122, 89, 0.9));
            }
            
            .indicator {
                fill: #00F4D2;
                animation: pulse 2s infinite;
            }
            @keyframes pulse {
                0% { fill: #00F4D2; filter: drop-shadow(0 0 4px #00F4D2); }
                50% { fill: #008f7a; filter: drop-shadow(0 0 12px #00F4D2); }
                100% { fill: #00F4D2; filter: drop-shadow(0 0 4px #00F4D2); }
            }

            .box {
                fill: rgba(30, 25, 35, 0.6);
                stroke: rgba(255, 255, 255, 0.05);
                stroke-width: 1;
                rx: 12;
                backdrop-filter: blur(10px);
            }
            
            .text-sm {
                font-family: 'Inter', sans-serif;
                font-weight: 600;
                font-size: 12px;
                fill: #FFCDB2;
                letter-spacing: 0.5px;
            }
            
            .text-sm-value {
                font-family: 'JetBrains Mono', monospace;
                font-size: 14px;
                fill: #FFFBF5;
            }
            
            /* Typing animation */
            .typing-text {
                display: inline-block;
                width: 0;
                white-space: nowrap;
                overflow: hidden;
                border-right: 2px solid #FF9F1C;
                animation: typing 4s steps(40) infinite alternate, cursorBlink .75s step-end infinite;
            }
        </style>
        
        <linearGradient id="gridGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FF7A59" />
            <stop offset="50%" stop-color="#8B5CF6" />
            <stop offset="100%" stop-color="#00F4D2" />
        </linearGradient>

        <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#FF9F1C" />
            <stop offset="100%" stop-color="#FF7A59" />
        </linearGradient>
        
        <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" class="grid" />
        </pattern>
        
        <radialGradient id="glowG" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF7A59" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#0F0C10" stop-opacity="0"/>
        </radialGradient>
    </defs>
    
    <!-- Background -->
    <rect width="800" height="400" class="bg" />
    <circle cx="650" cy="150" r="250" fill="url(#glowG)" />
    
    <!-- Animated Grid -->
    <g class="grid-moving">
        <rect width="840" height="440" x="-40" y="-40" fill="url(#smallGrid)" />
    </g>
    
    <rect width="800" height="400" fill="#0F0C10" opacity="0.6"/>
    
    <!-- Particles -->
    <g>
        <circle cx="150" cy="80" r="3" class="particle glow">
            <animate attributeName="cy" values="80; 50; 80" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.4; 1; 0.4" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="650" cy="120" r="4" class="particle glow" fill="#00F4D2">
            <animate attributeName="cy" values="120; 90; 120" dur="5s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0.3; 1; 0.3" dur="4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="700" cy="300" r="2" class="particle glow" fill="#8B5CF6">
            <animate attributeName="cy" values="300; 340; 300" dur="6s" repeatCount="indefinite"/>
        </circle>
    </g>
    
    <!-- Content Container -->
    <g transform="translate(60, 90)">
        <text y="0" class="title">Tanmay Mishra</text>
        <text y="35" class="subtitle">Software Engineer &amp; Cybersecurity</text>
        
        <!-- Interactive Terminal-like typing -->
        <g transform="translate(0, 75)">
            <rect width="360" height="44" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
            <text x="15" y="27" class="typewriter">$ <tspan fill="#FFFBF5">Engineer graceful recovery.</tspan></text>
            <!-- Cursor block for manual anim -->
            <rect x="250" y="13" width="9" height="18" class="cursor" />
        </g>
        
        <!-- Status Boxes (Glassmorphism) -->
        <g transform="translate(0, 150)">
            <rect x="0" y="0" width="160" height="80" class="box"/>
            <circle cx="20" cy="25" r="4" class="indicator"/>
            <text x="35" y="30" class="text-sm">SYSTEM STATUS</text>
            <text x="15" y="60" class="text-sm-value" fill="#00F4D2">ONLINE</text>
            
            <rect x="180" y="0" width="160" height="80" class="box"/>
            <text x="195" y="30" class="text-sm">CURRENT MISSION</text>
            <text x="195" y="60" class="text-sm-value" fill="#FF9F1C">HUNTERMIND</text>
            
            <rect x="360" y="0" width="160" height="80" class="box"/>
            <text x="375" y="30" class="text-sm">AVAILABILITY</text>
            <text x="375" y="60" class="text-sm-value" fill="#FF7A59">OPEN TO ROLES</text>
        </g>
    </g>

    <!-- Side Graphic Luminous Orb -->
    <g transform="translate(560, 70)">
        <circle cx="100" cy="100" r="100" fill="rgba(139, 92, 246, 0.1)" />
        <circle cx="100" cy="100" r="80" fill="none" stroke="url(#gridGrad)" stroke-width="1"/>
        <circle cx="100" cy="100" r="60" fill="none" stroke="#FF7A59" stroke-width="2" stroke-dasharray="8 4">
            <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="20s" repeatCount="indefinite"/>
        </circle>
        
        <!-- Glowing Core -->
        <circle cx="100" cy="100" r="20" fill="#00F4D2">
             <animate attributeName="r" values="20; 25; 20" dur="3s" repeatCount="indefinite"/>
             <animate attributeName="opacity" values="0.8; 1; 0.8" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="100" cy="100" r="30" fill="none" stroke="#00F4D2" stroke-width="2" class="glow">
             <animate attributeName="r" values="25; 45; 25" dur="2s" repeatCount="indefinite"/>
             <animate attributeName="opacity" values="0.8; 0; 0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
    </g>
</svg>
