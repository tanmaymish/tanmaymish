<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
    <defs>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
            
            .bg { fill: #14082B; stroke: #311A42; stroke-width: 2; rx: 12; }
            .node { fill: rgba(30, 20, 50, 0.9); stroke: #F472B6; stroke-width: 1.5; rx: 6; }
            .db-node { fill: rgba(30, 20, 50, 0.9); stroke: #60A5FA; stroke-width: 1.5; rx: 6; }
            .queue-node { fill: rgba(30, 20, 50, 0.9); stroke: #FBCFE8; stroke-width: 1.5; rx: 6; }
            
            .text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; fill: #FDF2F8; text-anchor: middle; }
            .subtext { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 11px; fill: #93C5FD; text-anchor: middle; }
            
            .line { stroke: #4B1F68; stroke-width: 2; fill: none; stroke-dasharray: 4 4; }
            
            .packet { fill: #F472B6; filter: drop-shadow(0 0 4px #F472B6); }
            
            /* Glowing node effect */
            .pulse { animation: nodePulse 3s infinite alternate; }
            @keyframes nodePulse {
                0% { filter: drop-shadow(0 0 2px rgba(244, 114, 182, 0.4)); }
                100% { filter: drop-shadow(0 0 10px rgba(244, 114, 182, 0.8)); }
            }

            .pulse-db { animation: dbPulse 4s infinite alternate; }
            @keyframes dbPulse {
                0% { filter: drop-shadow(0 0 2px rgba(96, 165, 250, 0.4)); }
                100% { filter: drop-shadow(0 0 10px rgba(96, 165, 250, 0.8)); }
            }
            
            .pulse-queue { animation: qPulse 2.5s infinite alternate; }
            @keyframes qPulse {
                0% { filter: drop-shadow(0 0 2px rgba(251, 207, 232, 0.4)); }
                100% { filter: drop-shadow(0 0 10px rgba(251, 207, 232, 0.8)); }
            }
        </style>
    </defs>
    
    <rect width="796" height="446" x="2" y="2" class="bg" />
    <text x="400" y="35" class="text" fill="#FBCFE8" font-size="18">DOMA (Distributed Order Management Architecture)</text>
    
    <path d="M 400 110 L 400 150" class="line" />
    <path d="M 400 190 L 400 230" class="line" />
    <path d="M 380 190 L 250 230" class="line" />
    <path d="M 420 190 L 550 230" class="line" />
    <path d="M 250 270 L 400 320" class="line" />
    <path d="M 400 270 L 400 320" class="line" />
    <path d="M 550 270 L 400 320" class="line" />
    <path d="M 250 270 L 150 320" class="line" />
    <path d="M 550 270 L 650 320" class="line" />
    <path d="M 400 360 L 400 400" class="line" />

    <!-- Packets (Animated) -->
    <circle r="4" class="packet"><animateMotion path="M 400 110 L 400 150" dur="1s" repeatCount="indefinite" /></circle>
    <circle r="4" class="packet"><animateMotion path="M 380 190 L 250 230" dur="1.2s" repeatCount="indefinite" /></circle>
    <circle r="4" class="packet"><animateMotion path="M 400 190 L 400 230" dur="1.1s" repeatCount="indefinite" /></circle>
    <circle r="4" class="packet"><animateMotion path="M 420 190 L 550 230" dur="1.3s" repeatCount="indefinite" /></circle>
    
    <circle r="4" class="packet" fill="#60A5FA"><animateMotion path="M 250 270 L 400 320" dur="1.5s" repeatCount="indefinite" /></circle>
    <circle r="4" class="packet" fill="#FBCFE8"><animateMotion path="M 550 270 L 650 320" dur="1.2s" repeatCount="indefinite" /></circle>

    <!-- Nodes -->
    <g transform="translate(320, 70)">
        <rect width="160" height="40" class="node pulse" />
        <text x="80" y="25" class="text">API Gateway</text>
    </g>
    <g transform="translate(320, 150)">
        <rect width="160" height="40" class="node pulse" />
        <text x="80" y="25" class="text">Load Balancer</text>
    </g>
    
    <g transform="translate(170, 230)">
        <rect width="160" height="40" class="node" />
        <text x="80" y="18" class="text">Order Service</text>
        <text x="80" y="32" class="subtext">Spring Boot</text>
    </g>
    <g transform="translate(350, 230)">
        <rect width="160" height="40" class="node" />
        <text x="80" y="18" class="text">Payment Service</text>
        <text x="80" y="32" class="subtext">Spring Boot</text>
    </g>
    <g transform="translate(530, 230)">
        <rect width="160" height="40" class="node" />
        <text x="80" y="18" class="text">Notification Service</text>
        <text x="80" y="32" class="subtext">Spring Boot</text>
    </g>

    <g transform="translate(70, 320)">
        <rect width="120" height="40" class="db-node pulse-db" />
        <text x="60" y="25" class="text">Redis Cache</text>
    </g>
    <g transform="translate(610, 320)">
        <rect width="120" height="40" class="db-node pulse-db" />
        <text x="60" y="25" class="text">PostgreSQL</text>
    </g>

    <g transform="translate(320, 320)">
        <rect width="160" height="40" class="queue-node pulse-queue" />
        <text x="80" y="18" class="text">Apache Kafka</text>
        <text x="80" y="32" class="subtext">Event Stream</text>
    </g>
    
    <g transform="translate(320, 400)">
        <rect width="160" height="40" class="node" />
        <text x="80" y="18" class="text">Event Workers</text>
        <text x="80" y="32" class="subtext">Data Processing</text>
    </g>
</svg>
